<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #18181c; --surface2: #222228;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f2; --text-muted: #888890; --text-faint: #44444c;
    --accent: #c8f04a; --accent-dim: rgba(200,240,74,0.10);
    --radius: 14px; --radius-sm: 8px;
  }
  html { -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100dvh; padding: 32px 20px 80px; }
  .container { max-width: 960px; margin: 0 auto; }

  /* ── HEADER ── */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; }
  .logo { font-family: 'Gmarket Sans', sans-serif; font-weight: 700; font-size: clamp(20px,4vw,26px); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-right { text-align: right; }
  .header-date { font-family: 'Gmarket Sans', sans-serif; font-size: 15px; font-weight: 500; color: var(--text); }
  .header-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ── WEATHER BAR ── */
  .weather-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .w-search-wrap { position: relative; }
  .w-search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    width: 180px;
    transition: border-color .2s;
  }
  .w-search-wrap input:focus { border-color: var(--accent); }
  .w-search-wrap input::placeholder { color: var(--text-faint); }
  .w-suggestions {
    position: absolute;
    top: calc(100% + 6px); left: 0;
    width: 260px;
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-sm);
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.7);
  }
  .w-sug-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 13px; transition: background .15s; }
  .w-sug-item:last-child { border-bottom: none; }
  .w-sug-item:hover { background: var(--accent-dim); }
  .w-sug-item .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .w-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
  .w-main { display: flex; align-items: center; gap: 10px; }
  .w-icon { font-size: 30px; line-height: 1; }
  .w-temp-block .temp { font-family: 'Gmarket Sans', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
  .w-temp-block .temp span { font-size: 14px; font-weight: 300; color: var(--text-muted); }
  .w-temp-block .w-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .w-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .w-stat-item { font-size: 11px; color: var(--text-muted); }
  .w-stat-item strong { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .w-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; font-family: 'Gmarket Sans', sans-serif; }
  .badge-good    { background: rgba(200,240,74,0.15);  color: #c8f04a; }
  .badge-normal  { background: rgba(88,166,255,0.15);  color: #58a6ff; }
  .badge-bad     { background: rgba(255,166,87,0.15);  color: #ffa657; }
  .badge-verybad { background: rgba(255,100,100,0.15); color: #ff6464; }
  .w-loading { font-size: 13px; color: var(--text-muted); font-family: 'Gmarket Sans', sans-serif; }

  /* ── CATEGORY SECTION ── */
  .section { margin-bottom: 32px; }
  .section-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }

  /* ── BOOKMARK CARD ── */
  .bcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: border-color .15s, transform .15s, background .15s;
    animation: fadeIn .2s ease both;
  }
  .bcard:hover { border-color: var(--border-hover); background: var(--surface2); transform: translateY(-2px); }
  .bcard-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .bcard-icon img { width: 28px; height: 28px; object-fit: contain; }
  .bcard-name { font-family: 'Gmarket Sans', sans-serif; font-size: 13px; font-weight: 500; text-align: center; line-height: 1.3; }
  .bcard-host { font-size: 10px; color: var(--text-faint); text-align: center; }

  /* default badge */
  .bcard.is-default { border-color: rgba(200,240,74,0.2); }
  .bcard.is-default .bcard-icon { background: var(--accent-dim); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  /* stagger */
  .bcard:nth-child(1){animation-delay:.02s} .bcard:nth-child(2){animation-delay:.04s}
  .bcard:nth-child(3){animation-delay:.06s} .bcard:nth-child(4){animation-delay:.08s}
  .bcard:nth-child(5){animation-delay:.10s} .bcard:nth-child(6){animation-delay:.12s}

  @media (max-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">My<span>Hub</span></div>
    <div class="header-right">
      <div class="header-date" id="hDate"></div>
      <div class="header-time" id="hTime"></div>
    </div>
  </header>

  <!-- 날씨 바 -->
  <div class="weather-bar" id="weatherBar">
    <div class="w-search-wrap">
      <input type="text" id="wInput" placeholder="동네, 도시 검색" autocomplete="off" />
      <div class="w-suggestions" id="wSug" style="display:none;"></div>
    </div>
    <div class="w-divider"></div>
    <div id="wContent" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <span class="w-loading">날씨 불러오는 중...</span>
    </div>
  </div>

  <!-- 북마크 섹션 (JS가 렌더링) -->
  <div id="bookmarks"></div>

</div>

<script>
/* ── 시계 ── */
function tick() {
  const now = new Date();
  document.getElementById('hDate').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  document.getElementById('hTime').textContent = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
tick(); setInterval(tick, 1000);

/* ── 날씨 ── */
const WMO = {
  0:['맑음','☀️'],1:['대체로 맑음','🌤️'],2:['구름 조금','⛅'],3:['흐림','☁️'],
  45:['안개','🌫️'],48:['안개','🌫️'],
  51:['이슬비','🌦️'],53:['이슬비','🌦️'],55:['이슬비','🌦️'],
  61:['비','🌧️'],63:['비','🌧️'],65:['폭우','🌧️'],
  71:['눈','🌨️'],73:['눈','🌨️'],75:['폭설','❄️'],
  80:['소나기','🌦️'],81:['소나기','🌦️'],82:['강한 소나기','⛈️'],
  95:['뇌우','⛈️'],96:['우박','⛈️'],99:['우박','⛈️']
};

function pmGrade(v, type) {
  if (type==='pm10') {
    if (v<=30) return ['좋음','badge-good'];
    if (v<=80) return ['보통','badge-normal'];
    if (v<=150) return ['나쁨','badge-bad'];
    return ['매우나쁨','badge-verybad'];
  } else {
    if (v<=15) return ['좋음','badge-good'];
    if (v<=35) return ['보통','badge-normal'];
    if (v<=75) return ['나쁨','badge-bad'];
    return ['매우나쁨','badge-verybad'];
  }
}

function locLabel(r) {
  const p = [r.name];
  if (r.admin2 && r.admin2 !== r.name) p.push(r.admin2);
  if (r.admin1 && r.admin1 !== r.admin2) p.push(r.admin1);
  if (r.country) p.push(r.country);
  return p.join(', ');
}

async function geoSuggest(q) {
  const r = await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=6&language=ko');
  const d = await r.json(); return d.results || [];
}

async function loadWeather(loc) {
  const [w, a] = await Promise.all([
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+loc.latitude+'&longitude='+loc.longitude+'&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m,precipitation&timezone=auto').then(r=>r.json()),
    fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+loc.latitude+'&longitude='+loc.longitude+'&current=pm10,pm2_5').then(r=>r.json())
  ]);
  const c = w.current;
  const [desc, icon] = WMO[c.weathercode] || ['--','🌡️'];
  const pm10 = a.current ? Math.round(a.current.pm10) : null;
  const pm25 = a.current ? Math.round(a.current.pm2_5) : null;
  const [l10, c10] = pm10 != null ? pmGrade(pm10,'pm10') : ['--','badge-normal'];
  const [l25, c25] = pm25 != null ? pmGrade(pm25,'pm25') : ['--','badge-normal'];
  const dispName = [loc.name, loc.admin2||loc.admin1].filter(Boolean).join(', ');

  document.getElementById('wContent').innerHTML =
    '<div class="w-main">' +
      '<div class="w-icon">'+icon+'</div>' +
      '<div class="w-temp-block">' +
        '<div class="temp">'+Math.round(c.temperature_2m)+'<span>°C</span></div>' +
        '<div class="w-desc">'+dispName+' · 체감 '+Math.round(c.apparent_temperature)+'° · '+desc+'</div>' +
      '</div>' +
    '</div>' +
    '<div class="w-divider"></div>' +
    '<div class="w-stats">' +
      '<div class="w-stat-item"><strong>'+c.relativehumidity_2m+'%</strong>습도</div>' +
      '<div class="w-stat-item"><strong>'+Math.round(c.windspeed_10m)+' km/h</strong>바람</div>' +
      '<div class="w-stat-item"><strong>'+c.precipitation+' mm</strong>강수</div>' +
      '<div class="w-stat-item"><strong>'+( pm10!=null?pm10:'--')+'<span style="font-size:10px;color:var(--text-muted)"> ㎍</span></strong>미세먼지 <span class="w-badge '+c10+'">'+l10+'</span></div>' +
      '<div class="w-stat-item"><strong>'+(pm25!=null?pm25:'--')+'<span style="font-size:10px;color:var(--text-muted)"> ㎍</span></strong>초미세 <span class="w-badge '+c25+'">'+l25+'</span></div>' +
    '</div>';
}

let wDebounce=null, wSelected=null;
const wInput = document.getElementById('wInput');
const wSug   = document.getElementById('wSug');

function showSug(results) {
  if (!results.length) { wSug.style.display='none'; return; }
  wSug.innerHTML = results.map((r,i)=>'<div class="w-sug-item" data-i="'+i+'"><div>'+r.name+'</div><div class="sub">'+locLabel(r)+'</div></div>').join('');
  wSug._r = results;
  wSug.style.display = 'block';
  wSug.querySelectorAll('.w-sug-item').forEach(el=>{
    el.addEventListener('mousedown', e=>{ e.preventDefault(); pickLoc(results[+el.dataset.i]); });
  });
}

function pickLoc(loc) {
  wSelected = loc;
  wInput.value = locLabel(loc);
  wSug.style.display = 'none';
  loadWeather(loc);
}

wInput.addEventListener('input', function() {
  wSelected = null;
  clearTimeout(wDebounce);
  const q = wInput.value.trim();
  if (q.length < 2) { wSug.style.display='none'; return; }
  wDebounce = setTimeout(()=>geoSuggest(q).then(showSug), 300);
});
wInput.addEventListener('keydown', e=>{ if(e.key==='Enter'&&wSelected) loadWeather(wSelected); if(e.key==='Escape') wSug.style.display='none'; });
wInput.addEventListener('blur', ()=>setTimeout(()=>wSug.style.display='none', 150));

geoSuggest('Seoul').then(r=>{ if(r.length) pickLoc(r[0]); });

/* ── BOOKMARKS ── */
const DATA = [
  {"name":"Google","url":"https://google.com","cat":"일상","isDefault":true},
  {"name":"GitHub","url":"https://github.com","cat":"업무","isDefault":true},
  {"name":"YouTube","url":"https://youtube.com","cat":"취미","isDefault":true},
  {"name":"Naver","url":"https://naver.com","cat":"일상","isDefault":true},
  {"name":"Claude","url":"https://claude.ai","cat":"업무","isDefault":true},
  {"name":"Coupang","url":"https://coupang.com","cat":"쇼핑","isDefault":true},
  {"name":"다음","url":"https://daum.net","cat":"일상","isDefault":false},
  {"name":"밍키","url":"https://mingky03.net/movie/194b6f17f3?page=3","cat":"취미","isDefault":false},
  {"name":"만화","url":"https://newtoki469.com/webtoon/11116400?sst=as_view&sod=desc&toon=%EC%84%B1%EC%9D%B8%EC%9B%B9%ED%88%B0","cat":"취미","isDefault":false},
  {"name":"일본","url":"https://missav.ws/dm27/ko/mdyd-913-uncensored-leak","cat":"취미","isDefault":false},
  {"name":"wms","url":"https://sso.mk.co.kr/auth/realms/mcp-khan-realm/protocol/openid-connect/auth?client_id=mcp-khan-wms&redirect_uri=https%3A%2F%2Fwms.mk.co.kr&state=4077d3a4-3d91-4548-b91e-4c2d70b2129e&response_mode=fragment&response_type=code&scope=openid&nonce=5c7fbfe6-a74e-4369-aa6c-b01fd499de39","cat":"업무","isDefault":false},
  {"name":"메모","url":"https://bromsukrhur.github.io/memo/memo.html","cat":"일상","isDefault":false},
  {"name":"OTT 모음","url":"ott.html","cat":"일상","isDefault":false},
  {"name":"날씨","url":"https://bromsukrhur.github.io/weather","cat":"일상","isDefault":false},
  {"name":"넷플릭스","url":"https://netflix.com","cat":"OTT","isDefault":false},
  {"name":"쿠팡플레이","url":"https://play.coupang.com","cat":"OTT","isDefault":false},
  {"name":"디즈니+","url":"https://disneyplus.com","cat":"OTT","isDefault":false},
  {"name":"티빙","url":"https://tving.com","cat":"OTT","isDefault":false},
  {"name":"웨이브","url":"https://wavve.com","cat":"OTT","isDefault":false},
  {"name":"Prime Video","url":"https://primevideo.com","cat":"OTT","isDefault":false},
  {"name":"cook-cooking","url":"https://bromsukrhur.github.io/cook-cooking","cat":"취미","isDefault":false},
  {"name":"study-alarm","url":"https://bromsukrhur.github.io/study-alarm","cat":"학습","isDefault":false},
  {"name":"card-tracker","url":"https://bromsukrhur.github.io/card-tracker","cat":"일상","isDefault":false},
  {"name":"study-Englishword","url":"https://bromsukrhur.github.io/study-Englishword","cat":"학습","isDefault":false}
];

const CAT_ORDER = ['일상','업무','취미','OTT','쇼핑','학습'];

function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return ''; }
}

function renderBookmarks() {
  const cats = {};
  DATA.forEach(item => {
    if (!cats[item.cat]) cats[item.cat] = [];
    cats[item.cat].push(item);
  });

  const order = [...CAT_ORDER, ...Object.keys(cats).filter(k=>!CAT_ORDER.includes(k))];
  let html = '';
  order.forEach(cat => {
    if (!cats[cat]) return;
    html += '<div class="section"><div class="section-title">'+cat+'</div><div class="grid">';
    cats[cat].forEach(item => {
      const domain = getDomain(item.url);
      const favicon = domain ? 'https://www.google.com/s2/favicons?sz=64&domain='+domain : '';
      html +=
        '<a class="bcard'+(item.isDefault?' is-default':'')+'" href="'+item.url+'" target="_blank" rel="noopener">' +
          '<div class="bcard-icon">'+(favicon?'<img src="'+favicon+'" onerror="this.parentNode.innerHTML=\'🔗\'">':'🔗')+'</div>' +
          '<div class="bcard-name">'+item.name+'</div>' +
          (domain?'<div class="bcard-host">'+domain+'</div>':'') +
        '</a>';
    });
    html += '</div></div>';
  });
  document.getElementById('bookmarks').innerHTML = html;
}

renderBookmarks();
</script>
</body>
</html>
